<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank you — Wally marts</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="brand" href="/">
        <img class="brand-logo" src="assets/logo-icon.svg" alt="" width="34" height="34" />
        <span>Wally marts</span>
      </a>
    </div>
  </header>

  <main class="center-page">
    <div class="thanks">
      <div class="mark">&#10003;</div>
      <h1 style="margin:0 0 10px">Thank you for your order!</h1>
      <p class="muted">
        Your payment went through and your order is confirmed. A receipt is on
        its way to your email.
      </p>
      <a class="btn btn-primary" href="/" style="margin-top:22px">Back to the shop</a>
    </div>
  </main>

  <footer class="footer">Handmade with care · Wally marts</footer>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Wally marts logo">
  <defs>
    <linearGradient id="wm-pal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6a862"/>
      <stop offset="1" stop-color="#e8843f"/>
    </linearGradient>
    <mask id="wm-hole">
      <rect x="0" y="0" width="120" height="120" fill="#ffffff"/>
      <circle cx="43" cy="80" r="10.5" fill="#000000"/>
    </mask>
  </defs>
  <!-- painter's palette -->
  <ellipse cx="60" cy="58" rx="46" ry="40" fill="url(#wm-pal)" mask="url(#wm-hole)"/>
  <!-- paint dabs, in the shop's product colours -->
  <circle cx="47" cy="37" r="7.5" fill="#5aa89b"/>
  <circle cx="67" cy="31" r="7.5" fill="#4fa3c7"/>
  <circle cx="86" cy="41" r="7.5" fill="#e8739a"/>
  <circle cx="93" cy="62" r="6.5" fill="#f4c34e"/>
</svg>

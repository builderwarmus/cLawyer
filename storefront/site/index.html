<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wally marts — handmade arts &amp; crafts</title>
  <meta name="description" content="Wally marts — original paintings, ceramics, and handmade little treasures, made by hand and shipped with love." />
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <button class="brand" id="brandBtn">
        <img class="brand-logo" src="assets/logo-icon.svg" alt="" width="34" height="34" />
        <span>Wally marts</span>
      </button>
      <button class="cart-btn" id="openCartBtn" aria-label="Open cart">
        Cart
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero-title">Original arts &amp; handmade crafts</h1>
      <p class="hero-subtitle">
        One-of-a-kind paintings, ceramics, and little treasures — made by hand
        and shipped with love.
      </p>
    </section>

    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>
  </main>

  <footer class="footer">Handmade with care · Wally marts</footer>

  <!-- Product detail -->
  <div class="scrim" id="scrim"></div>
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="mTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">&#10005;</button>
      <div class="modal-img" id="mImg"></div>
      <div class="modal-body">
        <span class="card-cat" id="mCat"></span>
        <h2 id="mTitle"></h2>
        <p class="modal-price" id="mPrice"></p>
        <p class="modal-desc" id="mDesc"></p>
        <button class="btn btn-primary btn-block" id="mAdd">Add to cart</button>
      </div>
    </div>
  </div>

  <!-- Cart -->
  <div class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h2>Your cart</h2>
      <button class="icon-btn" id="drawerClose" aria-label="Close cart">&#10005;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot" id="drawerFoot"></div>
  </div>

  <script src="assets/products.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
